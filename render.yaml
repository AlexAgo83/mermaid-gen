services:
  - type: web
    name: mermaid-gen
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    headers:
      # Mermaid output uses inline style attributes in the rendered SVG, so the
      # static site needs style-src 'unsafe-inline' even though script-src stays self-only.
      - path: /*
        name: Content-Security-Policy
        value: >-
          default-src 'self';
          script-src 'self';
          style-src 'self' 'unsafe-inline';
          img-src 'self' data: blob:;
          connect-src 'self' https://api.openai.com https://openrouter.ai https://api.anthropic.com https://api.x.ai https://api.mistral.ai https://generativelanguage.googleapis.com;
          worker-src 'self';
          font-src 'self' data:;
          object-src 'none';
          base-uri 'self';
          form-action 'self';
          frame-ancestors 'none'
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /icon.svg
        name: Cache-Control
        value: public, max-age=86400
      - path: /icon-192.png
        name: Cache-Control
        value: public, max-age=86400
      - path: /icon-512.png
        name: Cache-Control
        value: public, max-age=86400
      - path: /favicon.svg
        name: Cache-Control
        value: public, max-age=86400
      - path: /manifest.webmanifest
        name: Cache-Control
        value: no-cache
      - path: /sw.js
        name: Cache-Control
        value: no-cache
      - path: /*
        name: Cache-Control
        value: no-cache
