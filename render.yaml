services:
  - type: web
    name: mermaid-gen
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /icon.svg
        name: Cache-Control
        value: public, max-age=86400
      - path: /favicon.svg
        name: Cache-Control
        value: public, max-age=86400
      - path: /manifest.webmanifest
        name: Cache-Control
        value: no-cache
      - path: /sw.js
        name: Cache-Control
        value: no-cache
      - path: /*
        name: Cache-Control
        value: no-cache
